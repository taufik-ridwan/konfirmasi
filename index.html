<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Konfirmasi Jaringan PA 2026</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #2563eb;
            --bg: #f1f5f9;
            --card: #ffffff;
            --text: #1e293b;
            --border: #cbd5e1;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', sans-serif; }

        body {
            background-color: var(--bg);
            color: var(--text);
            display: flex;
            justify-content: center;
            padding: 20px;
            padding-bottom: 50px;
        }

        .container {
            width: 100%;
            max-width: 450px;
            background: var(--card);
            padding: 24px;
            border-radius: 16px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }

        h2 { font-size: 1.25rem; margin-bottom: 20px; text-align: center; color: var(--primary); }

        .form-group { margin-bottom: 18px; }

        label { display: block; font-size: 0.85rem; font-weight: 600; margin-bottom: 6px; color: #64748b; }

        input[type="text"], input[type="number"], select {
            width: 100%;
            padding: 12px;
            border: 1px solid var(--border);
            border-radius: 8px;
            font-size: 1rem;
            outline: none;
            background-color: #fff;
        }

        input:focus, select:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1);
        }

        /* Radio Button Styling */
        .radio-group {
            display: flex;
            gap: 15px;
            margin-top: 5px;
        }

        .radio-item {
            display: flex;
            align-items: center;
            cursor: pointer;
            font-weight: 500;
        }

        .radio-item input {
            margin-right: 8px;
            width: 18px;
            height: 18px;
        }

        /* JRS Input Group */
        .jrs-container {
            display: flex;
            border: 1px solid var(--border);
            border-radius: 8px;
            overflow: hidden;
        }

        .jrs-container select {
            width: 80px;
            border: none;
            background: #f8fafc;
            border-right: 1px solid var(--border);
            border-radius: 0;
            font-weight: 600;
        }

        .jrs-year {
            padding: 12px;
            background: #f8fafc;
            color: #64748b;
            border-right: 1px solid var(--border);
            font-size: 0.9rem;
            display: flex;
            align-items: center;
        }

        .jrs-container input {
            flex: 1;
            border: none;
            border-radius: 0;
        }

        /* Manual Name Field Animation */
        #manualNameContainer {
            display: none;
            margin-top: 10px;
            animation: slideDown 0.3s ease-out;
        }

        button {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s;
        }

        .btn-generate {
            background: var(--primary);
            color: white;
            margin-top: 10px;
        }

        .btn-generate:active { transform: scale(0.98); }

        /* Result Box */
        #result-section {
            display: none;
            margin-top: 25px;
            border-top: 2px dashed var(--border);
            padding-top: 20px;
            animation: fadeIn 0.4s;
        }

        .output-box {
            background: #f8fafc;
            padding: 15px;
            border-radius: 10px;
            border: 1px solid var(--border);
            white-space: pre-wrap;
            font-size: 0.95rem;
            line-height: 1.5;
            margin-bottom: 15px;
            color: #334155;
        }

        .btn-copy {
            background: #0f172a;
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes slideDown { 
            from { opacity: 0; transform: translateY(-10px); } 
            to { opacity: 1; transform: translateY(0); } 
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Generator Konfirmasi</h2>

    <!-- Dropdown Nama Residen -->
    <div class="form-group">
        <label for="residenSelect">Nama Residen</label>
        <select id="residenSelect" onchange="toggleManualName()">
            <option value="Taufik">Taufik</option>
            <option value="Bukan Taufik">Bukan Taufik</option>
        </select>
        
        <div id="manualNameContainer">
            <label style="margin-top: 10px;">Input Nama Manual</label>
            <input type="text" id="manualNama" placeholder="Masukkan nama lengkap">
        </div>
    </div>

    <!-- Panggilan Radio -->
    <div class="form-group">
        <label>Panggilan Penerima</label>
        <div class="radio-group">
            <label class="radio-item"><input type="radio" name="salutation" value="Mas" checked> Mas</label>
            <label class="radio-item"><input type="radio" name="salutation" value="Mbak"> Mbak</label>
        </div>
    </div>

    <!-- ID Container -->
    <div class="form-group">
        <label>Nomor JRS / PRS / FZ</label>
        <div class="jrs-container">
            <select id="prefix">
                <option value="JRS">JRS</option>
                <option value="PRS">PRS</option>
                <option value="FZ">FZ</option>
            </select>
            <div class="jrs-year">-26-</div>
            <input type="number" id="suffix" placeholder="100" pattern="\d*">
        </div>
    </div>

    <button class="btn-generate" onclick="generateText()">Generate Konfirmasi Jaringan</button>

    <!-- Result Area -->
    <div id="result-section">
        <label>Hasil Text (Siap Paste):</label>
        <div class="output-box" id="output"></div>
        <button class="btn-copy" onclick="copyText()">
            <svg id="copyIcon" style="width:18px;height:18px" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 5H6a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2v-1M8 5a2 2 0 002 2h2a2 2 0 002-2M8 5a2 2 0 012-2h2a2 2 0 012 2m0 0h2a2 2 0 012 2v3m2 4H10m0 0l3-3m-3 3l3 3"></path></svg>
            <span id="copyBtnText">Salin Text</span>
        </button>
    </div>
</div>

<script>
    // Handle visibility of manual name input
    function toggleManualName() {
        const selectValue = document.getElementById('residenSelect').value;
        const container = document.getElementById('manualNameContainer');
        if (selectValue === 'Bukan Taufik') {
            container.style.display = 'block';
            document.getElementById('manualNama').focus();
        } else {
            container.style.display = 'none';
        }
    }

    function getGreeting() {
        const hour = new Date().getHours();
        if (hour < 11) return "Selamat pagi";
        if (hour < 15) return "Selamat siang";
        if (hour < 18) return "Selamat sore";
        return "Selamat malam";
    }

    function generateText() {
        const selectValue = document.getElementById('residenSelect').value;
        const manualNama = document.getElementById('manualNama').value.trim();
        const prefix = document.getElementById('prefix').value;
        const suffix = document.getElementById('suffix').value.trim();
        const salutation = document.querySelector('input[name="salutation"]:checked').value;
        
        // Determine final name
        let finalNama = selectValue;
        if (selectValue === 'Bukan Taufik') {
            if (!manualNama) {
                alert("Harap masukkan nama manual");
                return;
            }
            finalNama = manualNama;
        }

        if (!suffix) {
            alert("Harap isi nomor ID");
            return;
        }

        const greeting = getGreeting();
        const fullID = `${prefix}-26-${suffix}`;

        const template = `${greeting} ${salutation}
Perkenalkan saya ${finalNama} dari residen PA
Izin untuk melakukan konfirmasi jaringan dengan kode
*${fullID}*
yang dikirimkan sesuai identitas dan gambaran makroskopik dibawah ini.`;

        document.getElementById('output').innerText = template;
        document.getElementById('result-section').style.display = 'block';
        
        // Scroll to result on small screens
        setTimeout(() => {
            window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
        }, 100);
    }

    function copyText() {
        const text = document.getElementById('output').innerText;
        navigator.clipboard.writeText(text).then(() => {
            const btn = document.querySelector('.btn-copy');
            const btnText = document.getElementById('copyBtnText');
            
            const originalColor = btn.style.background;
            btn.style.background = "#059669";
            btnText.innerText = "✓ Berhasil Disalin!";
            
            setTimeout(() => {
                btn.style.background = "#0f172a";
                btnText.innerText = "Salin Text";
            }, 2000);
        });
    }
</script>

</body>
</html>
